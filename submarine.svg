<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="56" height="30">
  <g fill="white">
    <!-- Main hull body -->
    <ellipse cx="300" cy="185" rx="200" ry="72"/>
    <!-- Conning tower -->
    <rect x="310" y="108" width="115" height="80" rx="18"/>
    <!-- Small tower bump (front of conning) -->
    <rect x="295" y="128" width="30" height="60" rx="10"/>
    <!-- Periscope vertical stem -->
    <rect x="392" y="42" width="26" height="75" rx="8"/>
    <!-- Periscope horizontal head -->
    <rect x="392" y="42" width="58" height="26" rx="8"/>
    <!-- Propeller housing box -->
    <rect x="56" y="152" width="80" height="76" rx="8"/>
    <!-- Propeller disc (outer) -->
    <ellipse cx="34" cy="190" rx="34" ry="44"/>
    <!-- Propeller cross (dark cutout feel) -->
    <rect x="30" y="150" width="8" height="80" rx="3" fill="#111"/>
    <rect x="4" y="186" width="60" height="8" rx="3" fill="#111"/>
  </g>
</svg>
