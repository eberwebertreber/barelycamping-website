<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost at Sea — BarelyCamping</title>
  <meta name="description" content="You've drifted off the map. Head back to camp." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="/submarine_white.png" />
  <link rel="apple-touch-icon" href="/submarine_white.png" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Depth gradient — soft warm haze up top, pitch black descent. */
    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%,
          rgba(220, 210, 195, 0.10) 0%,
          transparent 55%),
        linear-gradient(180deg,
          #141210 0%,
          #0a0907 45%,
          #040404 80%,
          #000 100%);
      background-attachment: fixed;
    }

    /* God rays — volumetric light shafts, warm ivory (moonlight / distant firelight) */
    .godrays {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
      mix-blend-mode: screen;
    }
    .ray {
      position: absolute;
      top: -12%;
      width: var(--w, 160px);
      height: 130%;
      left: var(--x);
      background: linear-gradient(180deg,
        rgba(250, 240, 220, 0.22) 0%,
        rgba(235, 220, 195, 0.13) 25%,
        rgba(210, 195, 170, 0.06) 55%,
        transparent 85%);
      transform: rotate(var(--rot, -6deg));
      transform-origin: top center;
      filter: blur(28px);
      opacity: 0.75;
      animation: ray-drift var(--dur, 14s) ease-in-out infinite alternate;
      animation-delay: var(--d, 0s);
    }
    @keyframes ray-drift {
      0%   { opacity: 0.45; transform: rotate(calc(var(--rot, -6deg) - 1.2deg)) translateX(-14px); }
      50%  { opacity: 0.9;  transform: rotate(var(--rot, -6deg)) translateX(0); }
      100% { opacity: 0.5;  transform: rotate(calc(var(--rot, -6deg) + 1.2deg)) translateX(14px); }
    }

    /* Subtle shimmer at the upper half — dust in a light beam */
    .caustics {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.3;
      mix-blend-mode: screen;
      background:
        radial-gradient(ellipse 40% 25% at 30% 15%, rgba(245, 230, 205, 0.18), transparent 60%),
        radial-gradient(ellipse 30% 20% at 70% 25%, rgba(230, 215, 190, 0.13), transparent 60%),
        radial-gradient(ellipse 35% 22% at 50% 8%,  rgba(240, 225, 200, 0.16), transparent 60%);
      animation: caustics-shimmer 9s ease-in-out infinite alternate;
    }
    @keyframes caustics-shimmer {
      0%   { opacity: 0.25; transform: translate(-8px, -4px) scale(1.02); }
      100% { opacity: 0.45; transform: translate(8px, 4px)  scale(0.98); }
    }

    .lost {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.2rem;
      position: relative;
      z-index: 3;
    }
    .lost-code {
      font-family: 'Bonfire', serif;
      font-size: clamp(6rem, 22vw, 14rem);
      line-height: 1;
      letter-spacing: 0.05em;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.55) 42%,
        rgba(200,200,200,0.35) 55%, rgba(255,255,255,0.9) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      -webkit-text-stroke: 1px rgba(255,255,255,0.35);
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.4))
              drop-shadow(0 4px 14px rgba(0,0,0,0.55))
              drop-shadow(0 0 18px rgba(255,255,255,0.08));
      margin: 0;
    }
    .lost-sub {
      width: 130px;
      opacity: 0.9;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.18))
              drop-shadow(0 0 28px rgba(100,180,255,0.12));
      animation: drift 6s ease-in-out infinite;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(-2deg); }
      50%      { transform: translate(10px, -14px) rotate(1deg); }
    }
    .lost-title {
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin: 0;
    }
    .lost-msg {
      max-width: 440px;
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      margin: 0;
    }
    .lost-back {
      margin-top: 1rem;
      padding: 0.9rem 2.2rem;
      border-radius: 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      color: #f0ece6;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .lost-back:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.3);
      transform: translateX(6px);
    }
    .lost-coords {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor">
    <img src="/submarine_white.png" alt="" draggable="false" />
  </div>

  <canvas id="particles"></canvas>

  <!-- Underwater ambience -->
  <div class="caustics" aria-hidden="true"></div>
  <div class="godrays" aria-hidden="true">
    <span class="ray" style="--x: 8%;  --w: 220px; --rot: -7deg; --dur: 13s; --d: 0s;"></span>
    <span class="ray" style="--x: 28%; --w: 140px; --rot: -5deg; --dur: 17s; --d: -4s;"></span>
    <span class="ray" style="--x: 46%; --w: 280px; --rot: -8deg; --dur: 19s; --d: -9s;"></span>
    <span class="ray" style="--x: 66%; --w: 160px; --rot: -4deg; --dur: 15s; --d: -2s;"></span>
    <span class="ray" style="--x: 84%; --w: 240px; --rot: -9deg; --dur: 21s; --d: -12s;"></span>
  </div>

  <!-- Heartbeat + flashlight overlays still work here -->
  <div id="heartbeat" aria-hidden="true"></div>
  <div id="flashlight" aria-hidden="true"></div>

  <main class="lost">
    <img src="/submarine_white.png" class="lost-sub" alt="" draggable="false" />
    <h1 class="lost-code">404</h1>
    <p class="lost-title">Signal Lost</p>
    <a href="/" class="lost-back">Return to Camp</a>
    <p class="lost-coords">LAT —— · LON —— · DEPTH UNKNOWN</p>
  </main>

  <script src="/script.js"></script>
</body>
</html>
