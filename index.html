<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarelyCamping</title>
  <link rel="icon" type="image/png" href="submarine_white.png" />
  <link rel="apple-touch-icon" href="submarine_white.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor">
    <img src="submarine_white.png" alt="" draggable="false" />
    <svg viewBox="0 0 240 110" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <ellipse cx="130" cy="72" rx="95" ry="30" fill="white"/>
      <rect x="138" y="38" width="52" height="35" rx="8" fill="white"/>
      <rect x="122" y="50" width="18" height="24" rx="5" fill="white"/>
      <rect x="177" y="16" width="9" height="26" rx="3" fill="white"/>
      <rect x="177" y="16" width="22" height="9" rx="3" fill="white"/>
      <rect x="30" y="61" width="32" height="22" rx="5" fill="white"/>
      <ellipse cx="16" cy="72" rx="14" ry="19" fill="white"/>
      <rect x="12" y="54" width="7" height="36" rx="2" fill="#0a0a0a"/>
      <rect x="3" y="68" width="26" height="7" rx="2" fill="#0a0a0a"/>
    </svg>
  </div>

  <!-- Ambient sound toggle (top right) -->
  <button class="ambient-btn" id="ambientBtn" title="Toggle ambient sound" aria-label="Toggle campfire sound">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M9 9v6M12 6v12M15 9v6M6 11v2M18 11v2"/>
    </svg>
  </button>
  <!-- Drop your campfire audio here when ready -->
  <audio id="ambientAudio" loop>
    <source src="campfire.mp3" type="audio/mpeg" />
  </audio>

  <canvas id="particles"></canvas>

  <!-- HERO -->
  <section class="hero">
    <video class="hero-video" id="heroVideo" autoplay muted loop playsinline>
      <source src="video_1.mp4" type="video/mp4" />
    </video>
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="logo-stack" id="logoStack">
        <span class="logo-line" id="line1">Barely</span>
        <span class="logo-line" id="line2">Camping</span>
      </div>

      <nav class="links">
        <a href="https://www.youtube.com/@barelycamping" target="_blank" class="link-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a2.994 2.994 0 0 0-2.107-2.117C19.379 3.5 12 3.5 12 3.5s-7.379 0-9.391.569A2.994 2.994 0 0 0 .502 6.186 31.35 31.35 0 0 0 0 12a31.35 31.35 0 0 0 .502 5.814 2.994 2.994 0 0 0 2.107 2.117C4.621 20.5 12 20.5 12 20.5s7.379 0 9.391-.569a2.994 2.994 0 0 0 2.107-2.117A31.35 31.35 0 0 0 24 12a31.35 31.35 0 0 0-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          YouTube
        </a>
        <a href="https://www.instagram.com/barelycamping" target="_blank" class="link-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.308.974.974 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.334 2.633-1.308 3.608-.974.974-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.334-3.608-1.308-.974-.974-1.246-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.334-2.633 1.308-3.608C4.515 2.497 5.783 2.225 7.149 2.163 8.415 2.105 8.795 2.163 12 2.163zm0-2.163C8.741 0 8.332.014 7.052.072 5.197.157 3.355.673 2.014 2.014.673 3.355.157 5.197.072 7.052.014 8.332 0 8.741 0 12c0 3.259.014 3.668.072 4.948.085 1.855.601 3.697 1.942 5.038 1.341 1.341 3.183 1.857 5.038 1.942C8.332 23.986 8.741 24 12 24s3.668-.014 4.948-.072c1.855-.085 3.697-.601 5.038-1.942 1.341-1.341 1.857-3.183 1.942-5.038.058-1.28.072-1.689.072-4.948s-.014-3.668-.072-4.948c-.085-1.855-.601-3.697-1.942-5.038C20.645.673 18.803.157 16.948.072 15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
          Instagram
        </a>
        <a href="https://www.tiktok.com/@barelycamping" target="_blank" class="link-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
          TikTok
        </a>
        <a href="mailto:hello@barelycamping.com" class="link-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          hello@barelycamping.com
        </a>
      </nav>
    </div>

    <div class="scroll-hint">
      <span>videos</span>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
    </div>
  </section>

  <!-- VIDEOS -->
  <section class="videos-section">
    <div class="videos-track-wrap">
      <div class="videos-track" id="videoTrack"></div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
